<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>
    <style>
        body {
            font-family: Arial;
            background: #0b0e14;
            color: white;
            text-align: center;
            padding: 80px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .sub {
            font-size: 20px;
            color: #9aa4b2;
            margin-bottom: 8px;
        }

        .detail {
            font-size: 16px;
            color: #6c7a92;
            margin-top: 8px;
        }

        .highlight {
            color: #3dd68c;
            font-weight: 600;
        }

        .cta {
            margin-top: 30px;
        }

        .cta a {
            color: #4f7aff;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid #4f7aff;
            padding: 10px 24px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .cta a:hover {
            background: #4f7aff;
            color: white;
        }

        .emoji-big {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <span class="emoji-big">🚀</span>

    <h1>You're on the list!</h1>

    <p class="sub">
        We’ll notify you when <span class="highlight">Campaign IQ</span> opens for early access.
    </p>

    <p class="detail">
        🎁 Early users get <span class="highlight">lifetime discounted pricing</span>.
    </p>

    <p class="detail">
        📧 Check your email for updates.
    </p>

    <div class="cta">
        <a href="index.html">👉 Try Campaign IQ Demo</a>
    </div>

</body>
</html>
